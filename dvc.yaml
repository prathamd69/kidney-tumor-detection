stages:
  data_processing:
    cmd: python -m src.components.data_processing
    deps:
      - src/components/data_processing.py
      - config/config.yaml
      - data/raw/images
      - data/raw/kidneyData.csv
    params:
      - data_processing.test_size
      - data_processing.random_state
      - data_processing.target_mapping
      - data_processing.relation_map
    outs:
      - data/final/train.csv
      - data/final/test.csv

  model_building:
    cmd: python -m src.components.model_building
    deps:
      - src/components/model_building.py
      - config/config.yaml
    params:
      - model_building.img_height
      - model_building.img_width
      - model_building.metrics
      - model_building.binary_loss
      - model_building.multi_loss
      - model_building.optimizer
      - model_building.num_classes
      - binaryclass_model_training.learning_rate
      - multiclass_model_training.learning_rate
    outs:
      - models/binaryclass/base_binary_model.keras
      - models/multiclass/base_multi_model.keras

  binaryclass_training:
    cmd: python -m src.components.binaryclassification.binaryclass_training
    deps:
      - src/components/binaryclassification/binaryclass_training.py
      - config/config.yaml
    params:
      - binaryclass_model_training.batch_size
      - binaryclass_model_training.epochs
      - binaryclass_model_training.learning_rate
    outs:
      - models/binaryclass/trained_binary_model.keras

  multiclass_training:
    cmd: python -m src.components.multiclassification.multiclass_training
    deps:
      - src/components/multiclassification/multiclass_training.py
      - config/config.yaml
    params:
      - multiclass_model_training.batch_size
      - multiclass_model_training.epochs
      - multiclass_model_training.learning_rate
    outs:
      - models/multiclass/trained_multi_model.keras

  binaryclass_evaluation:
    cmd: python -m src.components.binaryclassification.binarymodel_evaluation
    deps:
      - src/components/binaryclassification/binarymodel_evaluation.py
      - config/config.yaml

  multiclass_evaluation:
      cmd: python -m src.components.multiclassification.multimodel_evaluation
      deps:
        - src/components/multiclassification/multimodel_evaluation.py
        - config/config.yaml
