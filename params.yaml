data_processing:
  test_size: 0.25
  random_state: 27
  target_mapping:
    0: 0
    1: 0
    2: 0
    3: 1
  relation_map:
    0: 'Cyst'
    1: 'Normal'
    2: 'Stone'
    3: 'Tumor'
  
basic_model_params:
  img_height: 224
  img_width: 224

binaryclass_model_params:
  is_binaryClassification: True
  metrics: ["accuracy"]
  loss: "binary_crossentropy"
  optimizer: "Adam"
  batch_size: 32
  epochs: 5
  learning_rate: 0.005
  experiment_name: binaryclass_CNNs
  run_name: RESNET50V2_Evaluation_1

multiclass_model_params:
  is_binaryClassification: False
  metrics: ["accuracy"]
  loss: "sparse_categorical_crossentropy"
  optimizer: "Adam"
  num_classes: 4
  batch_size: 32
  epochs: 10
  learning_rate: 0.005
  experiment_name: multiclass_CNNs
  run_name: RESNET50V2_Evaluation_1