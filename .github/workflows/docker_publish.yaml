name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'README.md'
      - '.dvc/**'
      - 'data/**'
      - 'reports/**'
      - 'logs/**'
      - '.venv/**'
      - 'models/**'
      - 'research/**'
      - 'LICENSE'
      - '.db/**'
      - 'mlruns/**'
      - 'requirements-dev.txt'
      - 'src/binaryclassification/**'
      - 'src/multiclassification/**'
      - 'src/components/**'
      
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.dvc/**'
      - 'data/**'
      - 'reports/**'
      - 'logs/**'
      - '.venv/**'
      - 'models/**'
      - 'research/**'
      - 'LICENSE'
      - '.db/**'
      - 'mlruns/**'
      - 'requirements-dev.txt'
      - 'src/binaryclassification/**'
      - 'src/multiclassification/**'
      - 'src/components/**'
  
  

jobs:
  # --- CONTINUOUS INTEGRATION (CI) ---
  test-api:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          
      - name: Run PyTest
        run: python -m pytest tests/

  # --- CONTINUOUS DELIVERY (CD) ---
  # This ONLY runs on Pushes/Merges to main. It ignores Pull Requests.
  build-and-push:
    name: Build & Push Docker Image
    needs: test-api  
    
    # CRITICAL: Only push to Docker Hub if the push was specifically to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kidney-tumor-predictor:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kidney-tumor-predictor:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/kidney-tumor-predictor:buildcache,mode=max